<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #7eb89a;
    --sage-light: #b8d8c8;
    --sage-dark: #3d7a5e;
    --mint: #e8f5ee;
    --cream: #faf9f6;
    --warm: #f5f0e8;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --accent: #e8a87c;
    --accent-light: #fdf0e6;
    --danger: #e07070;
    --danger-light: #fdf0f0;
    --card-bg: rgba(255,255,255,0.95);
    --border: rgba(126,184,154,0.22);
    --shadow: 0 4px 24px rgba(61,122,94,0.09);
    --radius: 18px;
    --radius-sm: 10px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    color: var(--text);
  }

  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.25;
    pointer-events: none;
    animation: float 10s ease-in-out infinite;
    z-index: 0;
  }
  .blob1 { width: 500px; height: 500px; background: #b8d8c8; top: -160px; right: -100px; animation-delay: 0s; }
  .blob2 { width: 350px; height: 350px; background: #f5d5be; bottom: -100px; left: -80px; animation-delay: 4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-18px) scale(1.03); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* LAYOUT */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(250,249,246,0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    animation: slideUp 0.4s ease both;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .nav-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--sage-dark), var(--sage));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .nav-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .btn-logout {
    padding: 0.45rem 1.1rem;
    background: var(--warm);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-logout:hover { background: #efe8d8; color: var(--text); }

  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative; z-index: 1;
  }

  .greeting {
    margin-bottom: 1.75rem;
    animation: slideUp 0.5s ease 0.1s both;
  }
  .greeting h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    color: var(--text);
    letter-spacing: -0.03em;
  }
  .greeting p { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.2rem; }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
    animation: slideUp 0.5s ease 0.15s both;
  }
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    box-shadow: var(--shadow);
    transition: var(--transition);
    cursor: default;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(61,122,94,0.14); }
  .stat-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
    display: flex; align-items: center; gap: 5px;
  }
  .stat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .stat-card.income .stat-dot { background: var(--sage); }
  .stat-card.income .stat-value { color: var(--sage-dark); }
  .stat-card.expense .stat-dot { background: var(--accent); }
  .stat-card.expense .stat-value { color: #b86840; }
  .stat-card.balance .stat-dot { background: #7ea0d8; }
  .stat-card.balance .stat-value { color: #2a4a7a; }

  .loading-dots {
    font-size: 1.4rem;
    letter-spacing: 2px;
    animation: pulse 1.2s ease-in-out infinite;
    color: var(--text-muted);
  }

  /* CARDS */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 1.25rem;
  }
  .card-header {
    padding: 1.25rem 1.5rem 0.75rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .card-body { padding: 1.25rem 1.5rem; }

  /* ADD FORM */
  .add-card { animation: slideUp 0.5s ease 0.2s both; }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .form-grid .wide { grid-column: 1 / -1; }

  .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.35rem;
  }
  .field input, .field select {
    width: 100%;
    padding: 0.65rem 0.9rem;
    background: var(--mint);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    outline: none;
    transition: var(--transition);
    
  }
  .field input:focus, .field select:focus {
    border-color: var(--sage);
    background: white;
    box-shadow: 0 0 0 3px rgba(126,184,154,0.15);
  }
  .field input::placeholder { color: #c0c8d0; }

  .type-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 0.75rem;
  }
  .type-btn {
    flex: 1; padding: 0.6rem;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    color: var(--text-muted);
  }
  .type-btn.selected-income {
    background: var(--mint);
    border-color: var(--sage);
    color: var(--sage-dark);
  }
  .type-btn.selected-expense {
    background: var(--accent-light);
    border-color: var(--accent);
    color: #b86840;
  }

  .btn-add {
    padding: 0.65rem 1.5rem;
    background: linear-gradient(135deg, var(--sage-dark), var(--sage));
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(61,122,94,0.28); }
  .btn-add:active { transform: translateY(0); }

  /* TRANSACTIONS */
  .txn-card { animation: slideUp 0.5s ease 0.25s both; }
  .txn-header-row {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 0.5rem;
  }
  .btn-load {
    padding: 0.4rem 1rem;
    background: var(--warm);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--sage-dark);
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-load:hover { background: var(--mint); }

  .txn-list { list-style: none; }
  .txn-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.85rem 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease both;
    transition: var(--transition);
  }
  .txn-item:last-child { border-bottom: none; }
  .txn-item:hover { padding-left: 4px; }
  .txn-left { display: flex; align-items: center; gap: 12px; }
  .txn-icon {
    width: 38px; height: 38px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .txn-icon.income { background: var(--mint); }
  .txn-icon.expense { background: var(--accent-light); }
  .txn-cat {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
  }
  .txn-note {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .txn-amount {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    letter-spacing: -0.02em;
    font-weight: 700;
  }
  .txn-amount.income { color: var(--sage-dark); }
  .txn-amount.expense { color: #b86840; }

  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 0.9rem; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 1.75rem; left: 50%; transform: translateX(-50%) translateY(10px);
    padding: 0.7rem 1.4rem;
    background: var(--text);
    color: white;
    border-radius: 12px;
    font-size: 0.88rem;
    font-weight: 500;
    z-index: 100;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--sage-dark); }
  .toast.error { background: #c0392b; }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .wide { grid-column: 1; }
    .main { padding: 1.25rem 1rem 3rem; }
  }
</style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>

<div id="toast" class="toast"></div>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-icon">💸</div>
    <span class="nav-title">Finflow</span>
  </div>
  <button class="btn-logout" onclick="logout()">Sign out</button>
</nav>

<main class="main">

  <div class="greeting">
    <h2>Your Overview</h2>
    <p id="dateLabel">Loading...</p>
  </div>

  <!-- SUMMARY -->
  <div class="summary-grid">
    <div class="stat-card income">
      <div class="stat-label"><span class="stat-dot"></span> Income</div>
      <div class="stat-value" id="stat-income"><span class="loading-dots">···</span></div>
    </div>
    <div class="stat-card expense">
      <div class="stat-label"><span class="stat-dot"></span> Expenses</div>
      <div class="stat-value" id="stat-expense"><span class="loading-dots">···</span></div>
    </div>
    <div class="stat-card balance">
      <div class="stat-label"><span class="stat-dot"></span> Balance</div>
      <div class="stat-value" id="stat-balance"><span class="loading-dots">···</span></div>
    </div>
  </div>

  <!-- ADD TRANSACTION -->
  <div class="card add-card">
    <div class="card-header">
      <span class="card-title">Add Transaction</span>
    </div>
    <div class="card-body">
      <div class="type-toggle">
        <button class="type-btn selected-income" id="typeIncome" onclick="selectType('income')">↑ Income</button>
        <button class="type-btn" id="typeExpense" onclick="selectType('expense')">↓ Expense</button>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Amount (₹)</label>
          <input id="amount" type="number" placeholder="0.00">
        </div>
        <div class="field">
          <label>Category</label>
          <input id="category" placeholder="e.g. Food, Salary">
        </div>
        <div class="field wide">
          <label>Notes</label>
          <input id="notes" placeholder="Optional note...">
        </div>
      </div>
      <button class="btn-add" onclick="addTransaction()">Add Transaction</button>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div class="card txn-card">
    <div class="card-header">
      <span class="card-title">Transactions</span>
      <div class="txn-header-row">
        <button class="btn-load" onclick="loadTransactions()">Refresh ↺</button>
      </div>
    </div>
    <div class="card-body">
      <ul class="txn-list" id="transactions">
        <li class="empty-state">
          <div class="empty-icon">📋</div>
          <p>Click refresh to load your transactions</p>
        </li>
      </ul>
    </div>
  </div>

</main>
<script>
const BASE_URL = window.location.origin;

// Session check
window.onload = function() {
  const token = localStorage.getItem('token');

  if (!token || token === 'null' || token === 'undefined') {
    window.location.href = '/';
    return;
  }

  const now = new Date();
  document.getElementById('dateLabel').textContent =
    now.toLocaleDateString('en-IN', {
      weekday: 'long',
      day: 'numeric',
      month: 'long',
      year: 'numeric'
    });

  loadSummary();
  loadTransactions();
};

let selectedType = 'income';

function selectType(type) {
  selectedType = type;

  document.getElementById('typeIncome').className =
    'type-btn' + (type === 'income' ? ' selected-income' : '');

  document.getElementById('typeExpense').className =
    'type-btn' + (type === 'expense' ? ' selected-expense' : '');
}

function getToken() {
  return localStorage.getItem('token');
}

function getHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + getToken()
  };
}

function handleAuthError(res) {
  if (res.status === 401 || res.status === 422) {
    localStorage.removeItem('token');
    window.location.href = '/';
    throw new Error('Auth error');
  }
  return res;
}

function logout() {
  localStorage.removeItem('token');
  window.location.href = '/';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;

  setTimeout(() => t.classList.remove('show'), 3000);
}

function addTransaction() {
  const amount = document.getElementById('amount').value;
  const category = document.getElementById('category').value;
  const notes = document.getElementById('notes').value;

  if (!amount || !category) {
    return showToast('Amount and category required', 'error');
  }

  fetch(`${BASE_URL}/finance/`, {
    method: 'POST',
    headers: getHeaders(),
    body: JSON.stringify({
      amount,
      type: selectedType,
      category,
      notes
    })
  })
    .then(handleAuthError)
    .then(r => r.json())
    .then(data => {
      showToast(data.msg || 'Transaction added!');

      document.getElementById('amount').value = '';
      document.getElementById('category').value = '';
      document.getElementById('notes').value = '';

      loadSummary();
      loadTransactions();
    })
    .catch(e => {
      if (e.message !== 'Auth error') {
        showToast('Error adding transaction', 'error');
      }
    });
}

function loadTransactions() {
  fetch(`${BASE_URL}/finance/`, {
    headers: getHeaders()
  })
    .then(handleAuthError)
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('transactions');
      list.innerHTML = '';

      if (!data.transactions || data.transactions.length === 0) {
        list.innerHTML = `
          <li class="empty-state">
            <div class="empty-icon">📭</div>
            <p>No transactions yet. Add one above!</p>
          </li>
        `;
        return;
      }

      const icons = {
        food: '🍽️',
        salary: '💼',
        rent: '🏠',
        transport: '🚗',
        shopping: '🛍️',
        health: '💊',
        entertainment: '🎬',
        other: '📦'
      };

      data.transactions.forEach((t, i) => {
        const cat = t.category.toLowerCase();

        const icon =
          Object.keys(icons).find(k => cat.includes(k))
            ? icons[Object.keys(icons).find(k => cat.includes(k))]
            : (t.type === 'income' ? '💰' : '💳');

        const li = document.createElement('li');
        li.className = 'txn-item';
        li.style.animationDelay = `${i * 0.05}s`;

        li.innerHTML = `
          <div class="txn-left">
            <div class="txn-icon ${t.type}">${icon}</div>
            <div>
              <div class="txn-cat">${t.category}</div>
              ${t.notes ? `<div class="txn-note">${t.notes}</div>` : ''}
            </div>
          </div>
          <div class="txn-amount ${t.type}">
            ${t.type === 'income' ? '+' : '-'}₹${Number(t.amount).toLocaleString('en-IN')}
          </div>
        `;

        list.appendChild(li);
      });
    })
    .catch(e => {
      if (e.message !== 'Auth error') {
        showToast('Could not load transactions', 'error');
      }
    });
}

function loadSummary() {
  fetch(`${BASE_URL}/finance/summary`, {
    headers: getHeaders()
  })
    .then(handleAuthError)
    .then(r => r.json())
    .then(data => {
      const fmt = n => '₹' + Number(n || 0).toLocaleString('en-IN');

      document.getElementById('stat-income').textContent = fmt(data.income);
      document.getElementById('stat-expense').textContent = fmt(data.expense);
      document.getElementById('stat-balance').textContent = fmt(data.balance);
    })
    .catch(e => {
      if (e.message !== 'Auth error') {
        ['stat-income', 'stat-expense', 'stat-balance'].forEach(id => {
          document.getElementById(id).textContent = '—';
        });
      }
    });
}
</script>
</body>
</html>
